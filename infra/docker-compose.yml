services:
  postgres:
    image: postgres:16-alpine
    container_name: tax-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tax_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-tax_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tax_app_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tax_app} -d ${POSTGRES_DB:-tax_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

