spring:
  application:
    name: tax-assistant-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tax_assistant}
    username: ${DB_USERNAME:tax_app}
    password: ${DB_PASSWORD:tax_app_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off
    org.hibernate.type.descriptor.sql.BasicBinder: off
    org.springframework.security: info

app:
  security:
    jwt:
      secret: ${JWT_SECRET:local-development-secret-key-must-be-at-least-32-bytes}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
    refresh-token:
      expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:14}
    email:
      auto-verify: ${EMAIL_AUTO_VERIFY:false}
      fixed-code: ${EMAIL_FIXED_CODE:}
      verification-expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:10}
    password-reset:
      expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:30}
    login-lock-minutes: ${LOGIN_LOCK_MINUTES:15}
  files:
    local-storage-path: ${FILE_STORAGE_PATH:uploads}
    max-size-bytes: ${FILE_MAX_SIZE_BYTES:10485760}
