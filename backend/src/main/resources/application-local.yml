spring:
  datasource:
    url: jdbc:h2:file:./build/local-db/tax_assistant;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  security:
    jwt:
      expiration-minutes: 180
    email:
      auto-verify: true
  files:
    local-storage-path: build/local-uploads
